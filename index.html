<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anastasis Technologies Pvt Ltd - Secure Portal</title>
    <!-- Tailwind Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icon Framework -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="liquid-glass-bg min-h-screen text-slate-800 font-['Plus_Jakarta_Sans'] overflow-x-hidden relative flex flex-col justify-between">

    <!-- Interactive Ambient Light Orbs -->
    <div class="liquid-orb-1 absolute pointer-events-none"></div>
    <div class="liquid-orb-2 absolute pointer-events-none"></div>

    <!-- HEADER / NAVIGATION -->
    <header class="w-full max-w-7xl mx-auto px-6 py-4 flex justify-between items-center relative z-50 animate-fade-in">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-emerald-600 flex justify-center items-center font-bold text-white font-['Space_Grotesk'] shadow-md">A</div>
            <span class="text-lg font-extrabold tracking-widest text-slate-900 font-['Space_Grotesk']">ANASTASIS</span>
        </div>
        <nav class="hidden md:flex items-center space-x-8 text-xs font-bold tracking-widest text-slate-500">
            <button id="nav-auth" type="button" class="text-slate-900 hover:text-emerald-600 transition-colors uppercase">Authentication Center</button>
            <button id="nav-utility" type="button" class="hover:text-slate-900 hover:text-emerald-600 transition-colors uppercase">Credential Utility</button>
        </nav>
        <div class="text-[10px] bg-white border border-slate-200 px-4 py-2 rounded-full tracking-widest font-mono text-emerald-600 font-bold shadow-sm">
            SECURE NODE
        </div>
    </header>

    <!-- MAIN INTERACTIVE HUB (Split Screen Canvas Recreated) -->
    <main class="w-full max-w-6xl mx-auto px-4 py-6 md:py-10 flex justify-center items-center relative z-50 flex-grow">
        <div class="w-full grid grid-cols-1 md:grid-cols-12 bg-white/40 border border-white/70 shadow-2xl rounded-[2.5rem] overflow-hidden backdrop-blur-xl min-h-[580px]">
            
            <!-- LEFT CANVAS: Welcome Back Corporate Bio Panel (Recreated Green Panel) -->
            <div class="md:col-span-6 bg-gradient-to-br from-emerald-600 via-emerald-700 to-teal-800 p-8 flex flex-col justify-between items-center text-center text-white relative overflow-hidden animate-slide-right min-h-[400px] md:min-h-full">
                <!-- Decorative background elements -->
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/5 rounded-full blur-xl pointer-events-none"></div>
                <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-black/10 rounded-full blur-xl pointer-events-none"></div>

                <!-- Recreated Anastasis High-Tech Logo (Microscope / DNA Structure Hybrid) -->
                <div class="w-full flex flex-col items-center pt-4 relative z-10">
                    <div class="logo-container-floating relative w-32 h-32 mb-4 flex justify-center items-center">
                        <!-- Custom Vector Representation of the Biotech 'A' Logo -->
                        <svg class="w-full h-full drop-shadow-[0_8px_16px_rgba(0,0,0,0.25)]" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Alpha Base Helix Path -->
                            <path d="M35 100 L55 25 L65 25 L85 100" stroke="#a7f3d0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M42 75 L78 75" stroke="#a7f3d0" stroke-width="6" stroke-linecap="round"/>
                            <!-- Microscope Node Shell Overlay -->
                            <circle cx="45" cy="65" r="12" stroke="#34d399" stroke-width="5" fill="#047857"/>
                            <rect x="42" y="77" width="6" height="15" rx="2" fill="#34d399"/>
                            <path d="M35 95 L55 95" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
                            <!-- DNA Secondary Helix Loop Ring -->
                            <path d="M65 40 Q75 55 65 70 T65 100" stroke="#f0fdf4" stroke-width="4" fill="none" stroke-dasharray="2 4" class="animate-pulse"/>
                            <path d="M75 40 Q65 55 75 70 T75 100" stroke="#34d399" stroke-width="3" fill="none"/>
                            <!-- Sparkle nodes -->
                            <circle cx="85" cy="30" r="2" fill="#fff" class="animate-ping"/>
                            <circle cx="95" cy="45" r="3" fill="#34d399"/>
                        </svg>
                    </div>
                    
                    <h2 class="text-3xl font-extrabold tracking-tight font-['Space_Grotesk']">Welcome Back</h2>
                    <p class="text-xs text-emerald-100/90 max-w-sm mt-2 leading-relaxed">
                        Secure Authentication System for <br><span class="font-bold text-white">Anastasis Technologies Pvt Ltd</span>
                    </p>
                </div>

                <!-- Interactive Directives: Micro-Actions -->
                <div class="w-full max-w-xs space-y-2.5 pb-4 relative z-10 text-left">
                    <button id="btn-directive-research" type="button" class="w-full flex items-center justify-between bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-3 rounded-xl transition-all duration-200 active:scale-[0.98]">
                        <span class="flex items-center gap-3 text-xs font-semibold tracking-wider uppercase font-['Space_Grotesk']">
                            <i class="fa-solid fa-check text-emerald-300"></i> Research
                        </span>
                        <i class="fa-solid fa-chevron-right text-[10px] opacity-60"></i>
                    </button>
                    <button id="btn-directive-innovation" type="button" class="w-full flex items-center justify-between bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-3 rounded-xl transition-all duration-200 active:scale-[0.98]">
                        <span class="flex items-center gap-3 text-xs font-semibold tracking-wider uppercase font-['Space_Grotesk']">
                            <i class="fa-solid fa-check text-emerald-300"></i> Innovation
                        </span>
                        <i class="fa-solid fa-chevron-right text-[10px] opacity-60"></i>
                    </button>
                    <button id="btn-directive-recursion" type="button" class="w-full flex items-center justify-between bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-3 rounded-xl transition-all duration-200 active:scale-[0.98]">
                        <span class="flex items-center gap-3 text-xs font-semibold tracking-wider uppercase font-['Space_Grotesk']">
                            <i class="fa-solid fa-check text-emerald-300"></i> Security
                        </span>
                        <i class="fa-solid fa-chevron-right text-[10px] opacity-60"></i>
                    </button>
                </div>
            </div>

            <!-- RIGHT CANVAS: Security Access Verification Form -->
            <div class="md:col-span-6 p-8 lg:p-12 flex flex-col justify-center relative animate-slide-left min-h-[450px]">
                
                <!-- Navigation Tabs Layout -->
                <div class="flex justify-center space-x-8 mb-8 text-sm border-b border-slate-100 pb-2">
                    <button id="tab-login" type="button" class="tab-btn-active text-base font-bold tracking-wider transition-all duration-300 uppercase font-['Space_Grotesk'] pb-2">Login</button>
                    <button id="tab-register" type="button" class="tab-btn-inactive text-base font-bold tracking-wider transition-all duration-300 uppercase font-['Space_Grotesk'] pb-2">Sign Up</button>
                </div>

                <p id="form-sub-heading" class="text-xs text-slate-400 font-semibold text-center mb-6">Sign in to continue</p>

                <!-- Identity Verification Form Layout -->
                <form id="auth-form" class="space-y-4 text-left relative z-50">
                    <div class="flex flex-col">
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-emerald-600 text-sm"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" id="auth-email" required class="minimal-input w-full bg-slate-50/50 border border-slate-200/80 rounded-xl pl-11 pr-4 py-3.5 text-slate-900 text-sm focus:outline-none focus:border-emerald-500 transition-all" placeholder="Email Address">
                        </div>
                    </div>

                    <div class="flex flex-col">
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-emerald-600 text-sm"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="auth-password" required class="minimal-input w-full bg-slate-50/50 border border-slate-200/80 rounded-xl pl-11 pr-10 py-3.5 text-slate-900 text-sm focus:outline-none focus:border-emerald-500 transition-all" placeholder="Password">
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs cursor-pointer"><i class="fa-regular fa-eye-slash"></i></span>
                        </div>
                    </div>

                    <!-- Options Metadata Box -->
                    <div class="flex justify-between items-center w-full pt-1 text-xs font-semibold">
                        <label class="flex items-center gap-2 text-slate-500 cursor-pointer">
                            <input type="checkbox" class="accent-emerald-600 rounded"> Remember Me
                        </label>
                        <button type="button" id="btn-forgot" class="text-emerald-600 hover:text-emerald-700 hover:underline transition-all">Forgot Password?</button>
                    </div>

                    <!-- Submission Action Button -->
                    <button type="submit" id="btn-submit" class="w-full py-4 mt-2 rounded-xl bg-emerald-600 text-white font-bold tracking-wider shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 active:scale-[0.99] transition-all duration-300 text-sm font-['Space_Grotesk'] relative overflow-hidden group">
                        Login
                    </button>
                </form>

                <!-- Designer Core Signature Badge -->
                <div class="mt-8 pt-4 border-t border-slate-100 flex justify-between items-center text-[10px] text-slate-400 font-bold uppercase tracking-widest relative z-50">
                    <span>Registry Terminal</span>
                    <span class="text-emerald-600 font-extrabold bg-emerald-50 px-3 py-1 rounded-md border border-emerald-100 font-mono">Mehrab</span>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER FRAME -->
    <footer class="w-full text-center py-4 border-t border-slate-200/40 relative z-50 animate-fade-in">
        <p class="text-[10px] text-slate-400 tracking-widest uppercase font-mono font-bold">
            System Design Architecture Engineered By: <span class="text-slate-600 font-extrabold">Mehrab</span>
        </p>
    </footer>

    <!-- OVERLAYS AND VALIDATIONS MODAL -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex justify-center items-center p-4 opacity-0 pointer-events-none transition-all duration-500 scale-95 z-[999]">
        <div class="bg-white border border-slate-100 w-full max-w-sm p-8 text-center rounded-[2rem] shadow-2xl relative">
            <div class="w-14 h-14 bg-emerald-50 border border-emerald-100 rounded-full flex justify-center items-center mx-auto mb-4">
                <svg class="w-7 h-7 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-1 modal-status-heading font-['Space_Grotesk'] tracking-wide">Access Synchronized</h3>
            <p class="text-xs text-slate-500 mb-5 px-2" id="success-message"></p>
            
            <div class="skeuo-panel border p-5 rounded-2xl mb-1 text-left shadow-inner relative overflow-hidden">
                <label class="text-[9px] font-bold text-slate-400 tracking-widest block mb-2 uppercase font-['Space_Grotesk']">Hardware Token Identification</label>
                <input type="text" class="w-full skeuo-display font-mono font-bold text-emerald-600 text-xl rounded-xl outline-none p-2.5 text-center tracking-[0.2em]" value="8656" readonly>
                <button type="button" id="btn-skeuo-close" class="skeuo-push-btn w-full mt-4 py-2.5 px-4 text-white font-extrabold text-xs uppercase tracking-wider rounded-xl transition-all font-['Space_Grotesk']">
                    Verify Device Pipeline
                </button>
            </div>
        </div>
    </div>

    <!-- Alert System Stream -->
    <div id="error-alert" class="fixed bottom-6 right-6 max-w-md neo-brutal-alert p-4 flex flex-col space-y-3 opacity-0 pointer-events-none transition-all duration-300 translate-y-4 z-[999]">
        <div class="flex items-start space-x-3">
            <div class="w-8 h-8 bg-rose-500 text-white flex justify-center items-center text-sm font-bold border-2 border-black shadow-[2px_2px_0px_0px_#000]">⚠️</div>
            <div class="flex-1">
                <h4 class="font-extrabold uppercase tracking-wider text-xs text-slate-900 font-['Space_Grotesk']">Pipeline Interrupt</h4>
                <p class="text-[11px] mt-0.5 font-semibold text-rose-700 leading-relaxed" id="error-message"></p>
            </div>
        </div>
        <div class="text-right">
            <button id="btn-error-close" class="neo-brutal-close-btn px-3 py-1 text-[10px] font-black uppercase tracking-wider text-black bg-white border-2 border-black transition-all">Dismiss</button>
        </div>
    </div>

    <!-- Absolute GitHub Pages Script Module Attachment Hook -->
    <script type="module" src="auth.js"></script>
</body>
</html>
